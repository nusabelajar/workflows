name: Lint code & compile test

on:
  workflow_call:
    inputs:
      RUNNER:
        description: "Runner to use"
        type: string
        required: false
        default: 'ubuntu-latest'
      SKIP_LINT:
        description: "Skip lint step"
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ${{ inputs.RUNNER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          registries: |
            https://registry.npmjs.org/
            @nusabelajar:https://npm.pkg.github.com/|$GITHUB_TOKEN

      - name: Installing dependencies (bun)
        run: bun install

      - name: Lint code (bun)
        if: ${{ inputs.SKIP_LINT != true }}
        run: bun run lint

      - name: Build Code (bun)
        run: bun run build
