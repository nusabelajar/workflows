name: Lint code & compile test

on:
  workflow_call:
    inputs:
      RUNNER:
        description: "Runner to use"
        type: string
        required: false
        default: 'ubuntu-latest'
      SKIP_LINT:
        description: "Skip lint step"
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ${{ inputs.RUNNER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
          registries: |
            https://registry.npmjs.org/
            @nusabelajar:https://npm.pkg.github.com/|$GITHUB_TOKEN

      - name: Check if .ci.npmrc exists
        run: |
          if [ -f .ci.npmrc ]; then
            echo ".ci.npmrc file found. Copying to home directory."
            cp .ci.npmrc ~/.npmrc
          else
            echo ".ci.npmrc file not found. Skipping copy."
          fi

      - name: Installing dependencies (bun)
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUN_AUTH_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}

      - name: Lint code (bun)
        if: ${{ inputs.SKIP_LINT != true }}
        run: bun run lint

      - name: Build Code (bun)
        run: bun run build
